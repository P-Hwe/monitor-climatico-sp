name: Testes

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Rodar testes
        run: pytest -v
